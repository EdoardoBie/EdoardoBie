name: generate animation

on:
  # esegui automaticamente ogni 24 ore
  schedule:
    - cron: "0 */24 * * *" 
  
  # permette di eseguire manualmente il workflow
  workflow_dispatch:
  
  # esegui ad ogni push sul branch main
  push:
    branches:
    - main

jobs:
  generate:
    permissions: 
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      # genera il gioco snake dai contributi dell'utente (<github_user_name>)
      - name: generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: edoardobie
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
          
      # push del contenuto di <build_dir> nel branch 'output'
      - name: push github-contribution-grid-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
